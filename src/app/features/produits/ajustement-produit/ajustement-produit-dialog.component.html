<p-dialog
  [(visible)]="visible"
  (onHide)="onHide()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '460px' }"
>
  <ng-template pTemplate="header">
    <div class="flex align-items-center gap-2">
      <i class="pi pi-sliders-h text-orange-500"></i>
      <span class="font-bold text-900">Ajustement — {{ produit?.nom }}</span>
    </div>
  </ng-template>

  <form #ajustForm="ngForm" class="flex flex-column gap-4 pt-2">

    <!-- Entrepôt -->
    <div class="flex flex-column gap-1">
      <label class="text-sm font-medium text-700">Entrepôt <span class="text-red-400">*</span></label>
      <p-select
        name="entrepotId"
        [(ngModel)]="form.entrepotId"
        [options]="entrepotOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Sélectionner..."
        [required]="true"
        (onChange)="onEntrepotChange()"
        class="w-full"
      />
      @if (stockEntrepot !== null) {
        <small class="text-500">
          Stock actuel : <span class="font-semibold">{{ stockEntrepot | number:'1.0-2' }}</span>
        </small>
      }
    </div>

    <!-- Direction -->
    <div class="flex flex-column gap-1">
      <label class="text-sm font-medium text-700">Direction <span class="text-red-400">*</span></label>
      <p-selectbutton
        name="direction"
        [(ngModel)]="form.direction"
        [options]="directionOptions"
        optionLabel="label"
        optionValue="value"
      />
    </div>

    <!-- Quantité -->
    <div class="flex flex-column gap-1">
      <label class="text-sm font-medium text-700">Quantité <span class="text-red-400">*</span></label>
      <p-inputNumber
        name="quantite"
        [(ngModel)]="form.quantite"
        [min]="0.0001"
        [minFractionDigits]="0"
        [maxFractionDigits]="4"
        [required]="true"
        placeholder="0"
        styleClass="w-full"
      />
      @if (form.direction === 'negatif' && stockEntrepot !== null && form.quantite && form.quantite > stockEntrepot) {
        <small class="text-red-400">
          Insuffisant — disponible : {{ stockEntrepot | number:'1.0-2' }}
        </small>
      }
    </div>

    <!-- Raison -->
    <div class="flex flex-column gap-1">
      <label class="text-sm font-medium text-700">Raison</label>
      <textarea pTextarea name="raison" [(ngModel)]="form.raison"
        rows="2" placeholder="Casse, correction inventaire..." class="w-full"></textarea>
    </div>

  </form>

  <ng-template pTemplate="footer">
    <div class="flex justify-content-end gap-2">
      <p-button label="Annuler" severity="secondary" [outlined]="true"
        (onClick)="onHide()" [disabled]="saving" />
      <p-button
        label="Enregistrer"
        icon="pi pi-check"
        severity="warn"
        [loading]="saving"
        [disabled]="!form.entrepotId || !form.quantite || !form.direction"
        (onClick)="submit(ajustForm)"
      />
    </div>
  </ng-template>

</p-dialog>
