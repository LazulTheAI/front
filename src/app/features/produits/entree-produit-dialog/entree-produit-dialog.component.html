<p-dialog
  [header]="dialogHeader"
  [(visible)]="visible"
  (onHide)="onHide()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '500px' }"
>

  <form #entreeForm="ngForm" class="flex flex-column gap-4 pt-2">

    <!-- Entrepôt -->
    <div class="flex flex-column gap-1">
      <label class="text-sm font-medium text-700">{{ 'common.warehouse' | transloco }} <span class="text-red-500">*</span></label>
      <p-select
        name="entrepotId"
        [(ngModel)]="form.entrepotId"
        [options]="entrepotOptions"
        optionLabel="label"
        optionValue="value"
        [placeholder]="'entree_produit.select_warehouse' | transloco"
        [required]="true"
        class="w-full"
      />
    </div>

    <!-- Quantité -->
    <div class="flex flex-column gap-1">
      <label class="text-sm font-medium text-700">{{ 'common.quantity' | transloco }} <span class="text-red-500">*</span></label>
      <p-inputNumber
        name="quantite"
        [(ngModel)]="form.quantite"
        [min]="0.0001"
        [minFractionDigits]="0"
        [maxFractionDigits]="4"
        [required]="true"
        placeholder="0"
        styleClass="w-full"
      />
    </div>

    <!-- Coût unitaire snapshot -->
    <div class="flex flex-column gap-1">
      <label class="text-sm font-medium text-700">{{ 'entree_produit.unit_cost' | transloco }}</label>
      <p-inputNumber
        name="coutUnitaireSnapshot"
        [(ngModel)]="form.coutUnitaireSnapshot"
        [min]="0"
        [minFractionDigits]="2"
        [maxFractionDigits]="4"
        mode="currency"
        [currency]="appCurrency"
        [locale]="appCurrencyLocale"
        placeholder="0,00 €"
        styleClass="w-full"
      />
      <small class="text-400">{{ 'entree_produit.cost_note' | transloco }}</small>
    </div>

    <!-- Référence + Lot sur la même ligne -->
    <div class="grid">
      <div class="col-6 flex flex-column gap-1">
        <label class="text-sm font-medium text-700">{{ 'common.reference' | transloco }}</label>
        <input pInputText name="referenceId" [(ngModel)]="form.referenceId"
          [placeholder]="'entree_produit.reference_placeholder' | transloco" class="w-full" />
      </div>
      <div class="col-6 flex flex-column gap-1">
        <label class="text-sm font-medium text-700">{{ 'entree_produit.lot_number' | transloco }}</label>
        <input pInputText name="numeroLot" [(ngModel)]="form.numeroLot"
          [placeholder]="'entree_produit.lot_placeholder' | transloco" class="w-full" />
      </div>
    </div>

    <!-- DLC -->
    <div class="flex flex-column gap-1">
      <label class="text-sm font-medium text-700">{{ 'entree_produit.dlc' | transloco }}</label>
      <p-datepicker
        appendTo="body"
        name="dlc"
        [(ngModel)]="form.dlc"
        [showIcon]="true"
        dateFormat="dd/mm/yy"
        [placeholder]="'entree_produit.dlc_placeholder' | transloco"
        [minDate]="today"
        styleClass="w-full"
      />
    </div>

    <!-- Notes -->
    <div class="flex flex-column gap-1">
      <label class="text-sm font-medium text-700">{{ 'common.notes' | transloco }}</label>
      <textarea pTextarea name="notes" [(ngModel)]="form.notes"
        rows="2" [placeholder]="'entree_produit.notes_placeholder' | transloco" class="w-full"></textarea>
    </div>

  </form>

  <ng-template pTemplate="footer">
    <div class="flex justify-content-end gap-2">
      <p-button [label]="'common.cancel' | transloco" severity="secondary" [outlined]="true"
        (onClick)="onHide()" [disabled]="saving" />
      <p-button
        [label]="'entree_produit.save_entry' | transloco"
        icon="pi pi-check"
        severity="success"
        [loading]="saving"
        [disabled]="!form.entrepotId || !form.quantite"
        (onClick)="submit(entreeForm)"
      />
    </div>
  </ng-template>

</p-dialog>
