<p-dialog
  [header]="('entree_stock.title' | transloco) + ' — ' + (materiau?.nom ?? '')"
  [(visible)]="visible"
  (onHide)="onHide()"
  [modal]="true"
  [style]="{ width: '520px' }"
  [draggable]="false"
>
  <form #ngForm="ngForm" (ngSubmit)="submit(ngForm)" class="flex flex-column gap-4 pt-2">

    <!-- Info matériau -->
    <div class="surface-100 border-round p-3 flex align-items-center gap-3">
      <i class="pi pi-box text-primary text-2xl"></i>
      <div>
        <div class="font-semibold text-900">{{ materiau?.nom }}</div>
        <div class="text-500 text-sm">{{ 'common.unit' | transloco }} : {{ materiau?.unite }}</div>
      </div>
    </div>

    <!-- Quantité + Entrepôt (côte à côte) -->
    <div class="grid">
      <div class="col-6 flex flex-column gap-2">
        <label class="font-medium text-900" for="quantite">{{ 'entree_stock.quantity' | transloco }} <span class="text-red-500">*</span></label>
        <p-inputNumber
          inputId="quantite"
          name="quantite"
          [(ngModel)]="form.quantite"
          required
          [min]="0.0001"
          [minFractionDigits]="0"
          [maxFractionDigits]="4"
          [suffix]="' ' + (materiau?.unite ?? '')"
          placeholder="0"
          [class.ng-invalid]="ngForm.submitted && ngForm.controls['quantite']?.invalid"
        />
      </div>

      <div class="col-6 flex flex-column gap-2">
        <label class="font-medium text-900" for="entrepot">{{ 'common.warehouse' | transloco }} <span class="text-red-500">*</span></label>
        <p-select
          inputId="entrepot"
          name="entrepotId"
          [(ngModel)]="form.entrepotId"
          required
          [options]="entrepotOptions"
          [placeholder]="'entree_stock.select_warehouse' | transloco"
          [class.ng-invalid]="ngForm.submitted && ngForm.controls['entrepotId']?.invalid"
        />
      </div>
    </div>

    <p-divider align="left">
      <span class="text-500 text-sm font-medium">{{ 'entree_stock.optional_info' | transloco }}</span>
    </p-divider>

    <!-- Coût unitaire -->
    <div class="flex flex-column gap-2">
      <label class="font-medium text-900" for="cout">{{ 'entree_stock.unit_cost' | transloco }}</label>
      <p-inputNumber
        inputId="cout"
        name="coutUnitaire"
        [(ngModel)]="form.coutUnitaire"
        mode="currency"
        currency="EUR"
        locale="fr-FR"
        [minFractionDigits]="2"
        [maxFractionDigits]="4"
        [min]="0"
        [placeholder]="'entree_stock.cost_placeholder' | transloco"
      />
    </div>

    <!-- Référence + Lot -->
    <div class="grid">
      <div class="col-6 flex flex-column gap-2">
        <label class="font-medium text-900" for="ref">{{ 'common.reference' | transloco }}</label>
        <input
          pInputText
          id="ref"
          name="referenceId"
          [(ngModel)]="form.referenceId"
          maxlength="255"
          [placeholder]="'entree_stock.reference_placeholder' | transloco"
        />
      </div>
      <div class="col-6 flex flex-column gap-2">
        <label class="font-medium text-900" for="lot">{{ 'entree_stock.lot_number' | transloco }}</label>
        <input
          pInputText
          id="lot"
          name="numeroLot"
          [(ngModel)]="form.numeroLot"
          maxlength="100"
          [placeholder]="'entree_stock.lot_placeholder' | transloco"
        />
      </div>
    </div>

   <!-- Date expiration -->
    <div class="flex flex-column gap-2">
      <label class="font-medium text-900" for="expiration">
        {{ 'entree_stock.expiration_date' | transloco }}
        @if (materiau?.dlcObligatoire) {
          <span class="text-red-500">*</span>
        }
      </label>
      <p-datepicker
        inputId="expiration"
        name="expiresAt"
        [(ngModel)]="form.expiresAt"
        dateFormat="dd/mm/yy"
        [showIcon]="true"
        [minDate]="today"
        appendTo="body"
        [required]="!!materiau?.dlcObligatoire"
        [placeholder]="'entree_stock.expiration_placeholder' | transloco"
        [class.ng-invalid]="ngForm.submitted && ngForm.controls['expiresAt']?.invalid"
      />
      @if (materiau?.dlcObligatoire) {
        <small class="text-orange-500">
          <i class="pi pi-info-circle mr-1"></i>
          {{ 'entree_stock.dlc_required_hint' | transloco }}
        </small>
      }
    </div>

    <!-- Notes -->
    <div class="flex flex-column gap-2">
      <label class="font-medium text-900" for="notes">{{ 'common.notes' | transloco }}</label>
      <input
        pInputText
        id="notes"
        name="notes"
        [(ngModel)]="form.notes"
        maxlength="1000"
        [placeholder]="'common.notes_placeholder' | transloco"
      />
    </div>

  </form>

  <ng-template pTemplate="footer">
    <p-button
      [label]="'common.cancel' | transloco"
      severity="secondary"
      [text]="true"
      (onClick)="onHide()"
      [disabled]="saving"
    />
    <p-button
      [label]="'entree_stock.save_entry' | transloco"
      icon="pi pi-arrow-down"
      severity="success"
      [loading]="saving"
      (onClick)="submit(ngForm)"
    />
  </ng-template>
</p-dialog>
