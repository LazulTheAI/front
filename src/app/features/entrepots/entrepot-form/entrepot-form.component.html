<p-dialog
  [header]="dialogTitle"
  [(visible)]="visible"
  (onHide)="onHide()"
  [modal]="true"
  [style]="{ width: '440px' }"
  [draggable]="false"
>
  <form #ngForm="ngForm" class="flex flex-column gap-4 pt-2">

    <div class="flex flex-column gap-2">
      <label class="font-medium text-900" for="nom">
        Nom de l'entrepôt <span class="text-red-500">*</span>
      </label>
      <input
        pInputText
        id="nom"
        name="nom"
        [(ngModel)]="form.nom"
        required
        maxlength="255"
        placeholder="Ex: Atelier Principal, Stock Nord..."
        [class.ng-invalid]="ngForm.submitted && ngForm.controls['nom']?.invalid"
      />
      @if (ngForm.submitted && ngForm.controls['nom']?.invalid) {
        <small class="text-red-500">Le nom est requis</small>
      }
    </div>

    <div class="flex flex-column gap-2">
      <label class="font-medium text-900" for="adresse">Adresse</label>
      <textarea
        pTextarea
        id="adresse"
        name="adresse"
        [(ngModel)]="form.adresse"
        [rows]="3"
        placeholder="Adresse complète de l'entrepôt..."
        class="w-full"
      ></textarea>
    </div>

  </form>

  <ng-template pTemplate="footer">
    <p-button label="Annuler" severity="secondary" [text]="true" (onClick)="onHide()" [disabled]="saving" />
    <p-button
      [label]="isEdit ? 'Enregistrer' : 'Créer'"
      icon="pi pi-check"
      [loading]="saving"
      (onClick)="submit(ngForm)"
    />
  </ng-template>
</p-dialog>
