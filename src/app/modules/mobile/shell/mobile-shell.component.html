<div class="mobile-shell">
    <div class="mobile-alert-bar">
        <app-alerte-widget />
    </div>

    @if (entrepots.length > 0) {
        <div class="mobile-entrepot-bar">
            @if (entrepots.length === 1) {
                <div class="entrepot-single">
                    <i class="pi pi-warehouse"></i>
                    <span>{{ selectedEntrepot?.nom }}</span>
                </div>
            } @else {
                <div class="entrepot-selector" [class.is-open]="entrepotOpen">
                    <button type="button" class="entrepot-trigger" (click)="toggleEntrepot()">
                        <i class="pi pi-warehouse"></i>
                        <span class="entrepot-trigger-name">{{ selectedEntrepot?.nom ?? 'Choisir un entrepôt' }}</span>
                        <i class="pi pi-chevron-down entrepot-chevron"></i>
                    </button>
                    <div class="entrepot-dropdown">
                        @for (e of entrepots; track e.id) {
                            <button
                                type="button"
                                class="entrepot-option"
                                [class.is-selected]="e.id === selectedEntrepot?.id"
                                (click)="selectEntrepot(e)"
                            >
                                <i class="pi pi-warehouse"></i>
                                <span>{{ e.nom }}</span>
                                @if (e.id === selectedEntrepot?.id) {
                                    <i class="pi pi-check entrepot-check"></i>
                                }
                            </button>
                        }
                    </div>
                </div>
            }
        </div>
    }

    <main class="mobile-content">
        <router-outlet></router-outlet>
    </main>

    <nav class="mobile-bottom-nav">
        <a routerLink="dashboard" routerLinkActive="active" class="nav-item">
            <i class="pi pi-home"></i>
            <span>Dashboard</span>
        </a>
        <a routerLink="stock" routerLinkActive="active" class="nav-item">
            <i class="pi pi-box"></i>
            <span>Stock</span>
        </a>
        <a routerLink="scanner" routerLinkActive="active" class="nav-item nav-item--scanner">
            <i class="pi pi-barcode"></i>
            <span>Scanner</span>
        </a>
        <a routerLink="fabrication" routerLinkActive="active" class="nav-item">
            <i class="pi pi-cog"></i>
            <span>Fabrication</span>
        </a>
        <a routerLink="approvisionnements" routerLinkActive="active" class="nav-item">
            <i class="pi pi-shopping-cart"></i>
            <span>Appro.</span>
        </a>
        <a routerLink="commandes" routerLinkActive="active" class="nav-item">
            <i class="pi pi-send"></i>
            <span>Commandes</span>
        </a>
    </nav>
</div>
