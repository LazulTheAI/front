<div class="mobile-shell">
    <div class="mobile-alert-bar">
        <app-alerte-widget />
    </div>

    @if (entrepots.length > 0) {
        <div class="mobile-entrepot-bar">
            <i class="pi pi-warehouse"></i>
            @if (entrepots.length === 1) {
                <span class="entrepot-label">{{ selectedEntrepot?.nom }}</span>
            } @else {
                <p-select
                    [ngModel]="selectedEntrepot"
                    [options]="entrepotOptions"
                    optionLabel="label"
                    optionValue="value"
                    [showClear]="false"
                    styleClass="entrepot-select"
                    (onChange)="onEntrepotChange($event.value)"
                />
            }
        </div>
    }

    <main class="mobile-content">
        <router-outlet></router-outlet>
    </main>

    <nav class="mobile-bottom-nav">
        <a routerLink="dashboard" routerLinkActive="active" class="nav-item">
            <i class="pi pi-home"></i>
            <span>Dashboard</span>
        </a>
        <a routerLink="stock" routerLinkActive="active" class="nav-item">
            <i class="pi pi-box"></i>
            <span>Stock</span>
        </a>
        <a routerLink="scanner" routerLinkActive="active" class="nav-item nav-item--scanner">
            <i class="pi pi-barcode"></i>
            <span>Scanner</span>
        </a>
        <a routerLink="fabrication" routerLinkActive="active" class="nav-item">
            <i class="pi pi-cog"></i>
            <span>Fabrication</span>
        </a>
        <a routerLink="commandes" routerLinkActive="active" class="nav-item">
            <i class="pi pi-shopping-cart"></i>
            <span>Commandes</span>
        </a>
    </nav>
</div>
